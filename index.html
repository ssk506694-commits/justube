<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juwel Smart Player - Pro</title>
    <style>
        :root {
            --primary: #ff4444;
            --bg: #0a0a0a;
            --card-bg: #161616;
            --text: #e0e0e0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); scroll-behavior: smooth; }

        .player-wrapper {
            display: none;
            position: sticky;
            top: 0;
            background: rgba(10, 10, 10, 0.98);
            backdrop-filter: blur(10px);
            z-index: 2000;
            padding: 10px 0;
            border-bottom: 2px solid #333;
        }
        .main-player {
            width: 95%; max-width: 800px; aspect-ratio: 16/9;
            margin: auto; border-radius: 12px; overflow: hidden;
            background: #000; box-shadow: 0 0 20px rgba(255, 68, 68, 0.3);
        }
        #youtube-player { width: 100%; height: 100%; border: none; }
        
        .marquee-container {
            width: 100%; overflow: hidden; white-space: nowrap;
            background: #111; padding: 8px 0; margin-top: 5px;
        }
        #current-title {
            display: inline-block; padding-left: 100%;
            animation: marquee 15s linear infinite;
            color: var(--primary); font-weight: bold; font-size: 15px;
        }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        .ad-container { margin: 5px auto; width: 320px; height: 50px; display: none; overflow: hidden; text-align: center; }

        .container { max-width: 1200px; margin: auto; padding: 15px; }

        .search-container { margin: 10px 0 20px 0; text-align: center; }
        .search-box {
            width: 100%; max-width: 500px; padding: 12px 20px;
            border-radius: 30px; border: 1px solid #333;
            background: #1a1a1a; color: white; outline: none;
        }
        #list-status { font-size: 14px; color: var(--primary); margin-top: 10px; font-weight: bold; }

        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .video-card { background: var(--card-bg); border-radius: 10px; cursor: pointer; border: 1px solid #222; overflow: hidden; transition: 0.3s; }
        .video-card:hover { border-color: var(--primary); }
        .video-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .video-card p { padding: 10px; font-size: 13px; line-height: 1.4; height: 52px; overflow: hidden; }

        #loader-wrapper { text-align: center; padding: 100px 20px; }
        .percent-text { font-size: 28px; color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

<div class="player-wrapper" id="player-wrapper">
    <div class="main-player">
        <div id="youtube-player"></div>
    </div>
    <div class="marquee-container">
        <div id="current-title"></div>
    </div>
    <div id="ad-slot" class="ad-container"></div>
</div>

<div class="container" id="main-content" style="display: none;">
    <div class="search-container">
        <input type="text" id="search-input" class="search-box" placeholder="Search videos or channels...">
        <div id="list-status">Total Videos: 0</div>
    </div>
    <div class="video-grid" id="video-list"></div>
</div>

<div id="loader-wrapper">
    <div class="percent-text" id="percent-val">0%</div>
    <p style="margin-top: 15px; color: #888;">তথ্য যাচাই করা হচ্ছে...</p>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
    const sheetId = '1Sa9dJTYHuLRlJd_WrMceKwqygUw1UyPEsFnFhgJw5X8';
    const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv`;

    let allVideos = [];
    let currentList = [];
    let player;
    let currentVideoIndex = -1;
    let displayedCount = 0;
    const batchSize = 12;

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('youtube-player', {
            playerVars: { 'autoplay': 1, 'rel': 0, 'start': 1 },
            events: {
                'onStateChange': (event) => {
                    if (event.data == YT.PlayerState.ENDED) playNextVideo();
                }
            }
        });
    }

    function handleAds() {
        const adSlot = document.getElementById('ad-slot');
        const today = new Date().toDateString();
        let adStats = JSON.parse(localStorage.getItem('ad_stats_50')) || { date: today, count: 0 };

        if (adStats.date !== today) adStats = { date: today, count: 0 };

        if (adStats.count < 50) {
            adSlot.style.display = 'block';
            loadAdsterra();
            adStats.count++;
            localStorage.setItem('ad_stats_50', JSON.stringify(adStats));
        } else {
            adSlot.style.display = 'none';
        }
    }

    function loadAdsterra() {
        const adSlot = document.getElementById('ad-slot');
        adSlot.innerHTML = ""; 
        const s1 = document.createElement('script');
        s1.text = `atOptions = {'key' : '634d3d36c4e0430b751e33f1b314b137','format' : 'iframe','height' : 50,'width' : 320,'params' : {}};`;
        const s2 = document.createElement('script');
        s2.src = 'https://www.highperformanceformat.com/634d3d36c4e0430b751e33f1b314b137/invoke.js';
        adSlot.appendChild(s1);
        adSlot.appendChild(s2);
    }

    async function checkDataAndLoad() {
        try {
            const response = await fetch(csvUrl);
            const text = await response.text();
            const rows = text.split('\n').slice(1);
            allVideos = rows.map(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return { 
                    id: cols[0]?.replace(/"/g, '').trim(), 
                    title: cols[1]?.replace(/"/g, '').trim() || 'No Title',
                    channel: cols[2]?.replace(/"/g, '').trim() || 'Unknown' 
                };
            }).filter(v => v.id?.length > 5);

            document.getElementById('loader-wrapper').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            
            shuffleAndRender();
        } catch (e) { document.getElementById('percent-val').innerText = "Error!"; }
    }

    // স্মার্ট রেন্ডারিং ফাংশন
    function shuffleAndRender(activeVideo = null) {
        let sorted = [...allVideos].sort(() => Math.random() - 0.5);
        let finalSelection = [];

        if (activeVideo) {
            // ১. টাইটেল ম্যাচ করে পার্ট বের করা (যেমন: Part 1, Part 2)
            const baseTitle = activeVideo.title.split(/part|পর্ব/i)[0].trim().toLowerCase();
            const seriesVideos = sorted.filter(v => 
                v.id !== activeVideo.id && 
                v.title.toLowerCase().includes(baseTitle) && 
                (v.title.toLowerCase().includes('part') || v.title.toLowerCase().includes('পর্ব'))
            );

            // ২. ওই চ্যানেলের ৫টি র্যান্ডম ভিডিও
            const sameChannel = sorted.filter(v => 
                v.channel === activeVideo.channel && 
                v.id !== activeVideo.id && 
                !seriesVideos.some(sv => sv.id === v.id)
            ).slice(0, 5);

            // ৩. বাকি ভিডিওগুলো
            const others = sorted.filter(v => 
                v.id !== activeVideo.id && 
                !seriesVideos.some(sv => sv.id === v.id) && 
                !sameChannel.some(sc => sc.id === v.id)
            );

            finalSelection = [...seriesVideos, ...sameChannel, ...others];
        } else {
            finalSelection = sorted;
        }

        currentList = finalSelection;
        document.getElementById('video-list').innerHTML = '';
        displayedCount = 0;
        document.getElementById('list-status').innerText = `Total Videos: ${allVideos.length}`;
        renderBatch();
    }

    function renderBatch() {
        const container = document.getElementById('video-list');
        const nextBatch = currentList.slice(displayedCount, displayedCount + batchSize);
        nextBatch.forEach((v, index) => {
            const div = document.createElement('div');
            div.className = 'video-card';
            div.onclick = () => { 
                currentVideoIndex = displayedCount - batchSize + index; 
                playVideo(v); 
            };
            div.innerHTML = `<img src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg"><p>${v.title}</p>`;
            container.appendChild(div);
        });
        displayedCount += batchSize;
    }

    function playVideo(video) {
        document.getElementById('player-wrapper').style.display = 'block';
        player.loadVideoById({ videoId: video.id, startSeconds: 1 });
        
        document.getElementById('current-title').innerText = "NOW PLAYING: " + video.title + " • [" + video.channel + "]";
        
        // ভিডিও প্লে হলে রিকমেন্ডেশন আপডেট হবে
        shuffleAndRender(video);
        
        window.scrollTo({top: 0, behavior: 'smooth'});
        handleAds(); // অ্যাড লজিক কল করা হলো
    }

    function playNextVideo() {
        if (currentList.length > 0) {
            playVideo(currentList[0]);
        }
    }

    document.getElementById('search-input').addEventListener('input', (e) => {
        const q = e.target.value.toLowerCase();
        if(q.trim() === "") { shuffleAndRender(); return; }
        currentList = allVideos.filter(v => v.title.toLowerCase().includes(q) || v.channel.toLowerCase().includes(q));
        document.getElementById('video-list').innerHTML = '';
        displayedCount = 0;
        document.getElementById('list-status').innerText = `Found: ${currentList.length}`;
        renderBatch();
    });

    window.onscroll = () => {
        if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500) {
            if (displayedCount < currentList.length) renderBatch();
        }
    };

    window.onload = checkDataAndLoad;
</script>

</body>
</html>
